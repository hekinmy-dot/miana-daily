<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>板块新闻 - 缅A日报</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1><i class="fas fa-newspaper"></i> 板块新闻</h1>
                <p class="subtitle">各板块最新资讯 · 每日更新</p>
            </div>
        </header>

        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-newspaper"></i> 日报</a></li>
                <li><a href="dashboard.html"><i class="fas fa-chart-bar"></i> 数据看板</a></li>
                <li><a href="news.html" class="active"><i class="fas fa-newspaper"></i> 新闻</a></li>
            </ul>
        </nav>

        <main>
            <section class="sector-selector">
                <h2><i class="fas fa-layer-group"></i> 选择板块</h2>
                <div class="sector-buttons" id="sector-buttons">
                </div>
            </section>

            <section class="news-section">
                <h2 id="news-title"><i class="fas fa-rss"></i> 电力 · 板块新闻</h2>
                <div class="news-list" id="news-list">
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-bottom">
                <p>&copy; 2026 缅A日报 · 生成于 2026-05-23</p>
            </div>
        </footer>
    </div>

    <script src="data.js"></script>
    <script>
    (function() {
        var SECTORS = ['电网设备', '锂矿', '电子', 'AI应用', '储能', '固态电池', '云计算', '化工', '红利低波', '新能源', '黄金', '创新药', '稀土', '锂电池', '光伏', '电力', '白酒', '贵金属', '脑机接口', '港股创新药', '可控核聚变', '智能家居', '军工', '微盘股', '体育', '医药', '医疗', '机械设备', '动漫游戏', '港股红利', '港股科技', '金融科技', '传媒', '信创', '畜牧养殖', '港股消费', '软件', '证券', '煤炭', '农业', '新能源车', '交通运输', 'AI医疗', '低空经济', '家电', '食品饮料', '银行', '钢铁', 'CPO', '通信技术', '5G通信', '存储芯片', '机器人', '半导体材料', '半导体', '算力租赁', '商业航天', '有色金属', '人工智能', '消费电子', '中药', '计算机', '房地产', '国企改革', '红利', '建材', '港股医药', '汽车', '保险', '环保', '基建', '证券保险'];
        var currentSector = '电网设备';
        var sectorBtns = document.getElementById('sector-buttons');
        var newsList = document.getElementById('news-list');
        var newsTitle = document.getElementById('news-title');

        // 渲染板块按钮（紧凑标签布局）
        SECTORS.forEach(function(s) {
            var btn = document.createElement('button');
            btn.className = 'sector-chip' + (s === currentSector ? ' active' : '');
            btn.textContent = s;
            btn.onclick = function() {
                document.querySelectorAll('.sector-chip').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentSector = s;
                newsTitle.innerHTML = '<i class="fas fa-rss"></i> ' + s + ' · 板块新闻';
                renderNews(s);
            };
            sectorBtns.appendChild(btn);
        });

        function renderNews(sector) {
            var items = NEWS.filter(function(n) {
                return n.sector === sector;
            });
            if (items.length === 0) {
                newsList.innerHTML = '<div class="news-empty"><i class="fas fa-inbox"></i><p>暂无该板块新闻数据</p><p style="font-size:0.85rem;color:#8b949e;">新闻数据持续补充中，敬请期待</p></div>';
                return;
            }
            var html = '';
            items.forEach(function(n) {
                html += '<div class="news-item">';
                if (n.link) {
                    html += '<h3 class="news-headline"><a href="' + n.link + '" target="_blank">' + n.title + '</a></h3>';
                } else {
                    html += '<h3 class="news-headline">' + n.title + '</h3>';
                }
                html += '<p class="news-summary">' + n.summary + '</p>';
                html += '<div class="news-meta">';
                html += '<span class="news-source"><i class="fas fa-globe"></i> ' + n.source + '</span>';
                html += '<span class="news-time"><i class="fas fa-clock"></i> ' + n.time + '</span>';
                html += '</div>';
                html += '</div>';
            });
            newsList.innerHTML = html;
        }

        renderNews(currentSector);
    })();
    </script>
</body>
</html>
